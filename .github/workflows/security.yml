name: Security

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # tous les lundis 06:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit des dépendances (audit-ci, niveau high)
        run: npx --yes audit-ci --config audit-ci.jsonc

  gitleaks:
    name: Détection de secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
