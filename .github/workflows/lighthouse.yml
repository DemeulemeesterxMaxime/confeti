name: Lighthouse CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Audit Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
